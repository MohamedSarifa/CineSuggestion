<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body class="register-page">

<div class="auth-overlay">

    <div class="auth-box">

        <h1>Create Account</h1>

        <form action="/save_user"
              method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Register
            </button>

        </form>

        <p>

            Already have an account?

            <a href="/login">
                Login
            </a>

        </p>

    </div>

</div>

</body>
</html>
