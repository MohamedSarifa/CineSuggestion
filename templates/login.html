<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body class="login-page">

<div class="auth-overlay">

    <div class="auth-box">

        <h1>Sign In</h1>

        <form action="/check_login"
              method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            New User?

            <a href="/register">
                Register
            </a>

        </p>

    </div>

</div>

</body>
</html>
